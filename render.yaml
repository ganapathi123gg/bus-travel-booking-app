# Render Blueprint - Infrastructure as Code
# Deploys both the Django backend and React frontend

services:
  # Backend - Django REST API
  - type: web
    name: ganapathi-travels-api
    env: python
    region: singapore
    plan: free
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: gunicorn travels.wsgi --chdir travels --log-file -
    healthCheckPath: /api/buses/
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://ganapathi-travels.onrender.com,http://localhost:5174,http://localhost:5173"
      - key: DATABASE_URL
        fromDatabase:
          name: ganapathi-travels-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.0"
    source:
      repo: https://github.com/ganapathi123gg/bus-travel-booking-app
      branch: main
      rootDir: Travels_App_DjangRF-main

  # Frontend - React Static Site
  - type: web
    name: ganapathi-travels
    env: static
    region: singapore
    buildCommand: cd React_Django_travels_project-main && npm install && npm run build
    staticPublishPath: React_Django_travels_project-main/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://ganapathi-travels-api.onrender.com/api
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    source:
      repo: https://github.com/ganapathi123gg/bus-travel-booking-app
      branch: main
      rootDir: React_Django_travels_project-main

databases:
  - name: ganapathi-travels-db
    region: singapore
    plan: free
    databaseName: ganapathi_travels
    ipAllowList: []
